        "400":
          description: 请求参数错误或无效的分类级别
          schema:
            $ref: '#/definitions/backend_pkg_response.Response'
        "409":
          description: 分类名称已存在
          schema:
            $ref: '#/definitions/backend_pkg_response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/backend_pkg_response.Response'
