definitions:
  backend_internal_models.Craft:
    properties:
      category:
        $ref: '#/definitions/backend_internal_models.ICHCategory'
      categoryID:
        type: integer
      createdAt:
        type: string
      deletedAt:
        $ref: '#/definitions/gorm.DeletedAt'
      description:
        description: 工艺概况
        type: string
      difficulty:
        description: 技艺难度等级
        type: integer
      history:
        description: 历史沿革
        type: string
      id:
        type: integer
      name:
        type: string
      regionFeatures:
        description: 不同地域的表现形式差异
        items:
          type: integer
        type: array
      tools:
        description: 所需核心工具列表
        items:
          type: integer
        type: array
      updatedAt:
        type: string
    type: object
  backend_internal_models.CreateCommentRequest:
    properties:
      content:
        maxLength: 1000
        type: string
      media_url:
        type: string
      parent_id:
        description: 回复某条评论
        type: integer
      root_id:
        description: 所属楼层根 ID
        type: integer
      work_id:
        type: integer
    required:
    - content
    - work_id
    type: object
  backend_internal_models.CreateWorkRequest:
    properties:
      category_id:
        type: integer
      content:
        type: string
      content_type:
        enum:
        - 1
        - 2
        - 3
        type: integer
      craft_id:
        type: integer
      creation_time:
        description: 作品实际创作时间
        type: string
      materials:
        description: 材料
        items:
          type: string
        type: array
      media:
        items:
          $ref: '#/definitions/backend_internal_models.MediaItem'
        type: array
      region_id:
        type: integer
      technique_tags:
        description: 技艺标签
        items:
          type: string
        type: array
      title:
        maxLength: 200
        type: string
    required:
    - content
    - content_type
    - media
    - title
    type: object
  backend_internal_models.FavoriteRequest:
    properties:
      folder_id:
        type: integer
      remark:
        type: string
      work_id:
        type: integer
    required:
    - work_id
    type: object
  backend_internal_models.ICHCategory:
    properties:
      createdAt:
        type: string
      deletedAt:
        $ref: '#/definitions/gorm.DeletedAt'
      description:
        type: string
      iconURL:
        type: string
      id:
        type: integer
      level:
        type: integer
      name:
        type: string
      parentID:
        type: integer
      regionCode:
        description: 分类的地域特色标识
        type: string
      sortOrder:
        description: 排序权重
        type: integer
      status:
        description: 分类启用状态
        type: integer
      updatedAt:
        type: string
    type: object
  backend_internal_models.MediaItem:
    properties:
      description:
        type: string
      media_type:
        enum:
        - 1
        - 2
        - 3
        - 4
        type: integer
      sort_order:
        type: integer
      thumbnail_url:
        type: string
      url:
        type: string
    required:
    - media_type
    - url
    type: object
  backend_internal_models.Region:
    properties:
      code:
        description: 行政区划代码（如 110101）
        type: string
      createdAt:
        type: string
      cultureDesc:
        description: 地域文化背景描述
        type: string
      deletedAt:
        $ref: '#/definitions/gorm.DeletedAt'
      id:
        type: integer
      isHeritageCenter:
        description: 是否为非遗重点保护区域
        type: boolean
      level:
        description: 级别：省/市/县
        type: integer
      name:
        type: string
      parentID:
        description: 上级区域 ID
        type: integer
      updatedAt:
        type: string
    type: object
  backend_internal_models.UserStatus:
    enum:
    - 0
    - 1
    - 2
    format: int32
    type: integer
    x-enum-comments:
      UserStatusActive: 正常可用
      UserStatusDisabled: 封禁状态
      UserStatusPending: 注册待激活或资料审核中
    x-enum-descriptions:
    - 封禁状态
    - 正常可用
    - 注册待激活或资料审核中
    x-enum-varnames:
    - UserStatusDisabled
    - UserStatusActive
    - UserStatusPending
  backend_internal_services.ChangePasswordRequest:
    properties:
      new_password:
        maxLength: 32
        minLength: 6
        type: string
      old_password:
        type: string
      user_id:
        type: integer
    required:
    - new_password
    - old_password
    - user_id
    type: object
  backend_internal_services.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  backend_internal_services.RegisterRequest:
    properties:
      email:
        type: string
      password:
        maxLength: 32
        minLength: 6
        type: string
      phone:
        type: string
      status:
        $ref: '#/definitions/backend_internal_models.UserStatus'
      user_type:
        type: string
      username:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - email
    - password
    - username
    type: object
  backend_internal_services.UpdateUserRequest:
    properties:
      email:
        type: string
      id:
        type: integer
      status:
        enum:
        - "0"
        - "1"
        - "2"
        type: string
      user_type:
        enum:
        - user
        - master
        - institution
        - admin
        type: string
    required:
    - id
    type: object
  backend_pkg_response.ErrorField:
    properties:
      code:
        type: string
      details:
        type: object
      message:
        type: string
    type: object
  backend_pkg_response.PageInfo:
    properties:
      page_num:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  backend_pkg_response.Response:
    properties:
      data:
        type: object
      error:
        $ref: '#/definitions/backend_pkg_response.ErrorField'
      page:
        $ref: '#/definitions/backend_pkg_response.PageInfo'
      request_id:
        type: string
    type: object
  gorm.DeletedAt:
    properties:
      time:
        type: string
      valid:
        description: Valid is true if Time is not NULL
        type: boolean
    type: object
info:
  contact: {}
paths:
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: 使用Refresh Token获取新的Access Token
      parameters:
      - description: Refresh Token
        in: body
        name: request
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: 刷新成功
          schema:
            $ref: '#/definitions/backend_pkg_response.Response'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/backend_pkg_response.Response'
        "401":
          description: 无效的Refresh Token
          schema:
            $ref: '#/definitions/backend_pkg_response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/backend_pkg_response.Response'
      summary: 刷新Access Token
      tags:
      - auth
  /categories:
    get:
      consumes:
      - application/json
      description: 获取所有非遗分类列表
      parameters:
      - description: 排序字段
        in: query
        name: order_by
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            $ref: '#/definitions/backend_pkg_response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/backend_pkg_response.Response'
      summary: 获取分类列表
      tags:
      - categories
    post:
      consumes:
      - application/json
      description: 创建新的非遗分类（仅管理员可操作）
