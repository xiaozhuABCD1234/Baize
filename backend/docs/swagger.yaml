basePath: /api/v1
definitions:
  backend_pkg_response.ErrorField:
    properties:
      code:
        type: string
      details:
        type: object
      message:
        type: string
    type: object
  backend_pkg_response.PageInfo:
    properties:
      page_num:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  backend_pkg_response.Response:
    properties:
      data:
        type: object
      error:
        $ref: '#/definitions/backend_pkg_response.ErrorField'
      page:
        $ref: '#/definitions/backend_pkg_response.PageInfo'
      request_id:
        type: string
    type: object
host: localhost:1323
info:
  contact:
    email: support@example.com
    name: Baize Team
    url: https://github.com/your-org/baize
  description: 用户管理API，提供用户注册、登录、信息管理等功能，基于JWT令牌认证。
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://example.com/terms/
  title: User Management API
  version: 1.0.0
paths:
  /users:
    get:
      description: 分页获取用户列表
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 10
        description: 每页数量
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/backend_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: 获取用户列表
      tags:
      - users
  /users/{id}:
    delete:
      description: 根据ID删除用户
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/backend_pkg_response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/backend_pkg_response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/backend_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: 删除用户
      tags:
      - users
    get:
      description: 根据ID获取用户信息
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/backend_pkg_response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/backend_pkg_response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/backend_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: 获取用户
      tags:
      - users
    put:
      consumes:
      - application/json
      description: 更新用户信息
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      - description: 更新请求
        in: body
        name: request
        required: true
        schema:
          properties:
            email:
              type: string
            name:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/backend_pkg_response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/backend_pkg_response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/backend_pkg_response.Response'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/backend_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: 更新用户
      tags:
      - users
  /users/{id}/password:
    put:
      consumes:
      - application/json
      description: 修改用户密码
      parameters:
      - description: 用户ID
        in: path
        name: id
        required: true
        type: integer
      - description: 修改密码请求
        in: body
        name: request
        required: true
        schema:
          properties:
            new_password:
              type: string
            old_password:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/backend_pkg_response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/backend_pkg_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/backend_pkg_response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/backend_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: 修改密码
      tags:
      - users
  /users/login:
    post:
      consumes:
      - application/json
      description: 用户登录获取Token
      parameters:
      - description: 登录请求
        in: body
        name: request
        required: true
        schema:
          properties:
            email:
              type: string
            password:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/backend_pkg_response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/backend_pkg_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/backend_pkg_response.Response'
      summary: 用户登录
      tags:
      - users
  /users/register:
    post:
      consumes:
      - application/json
      description: 创建新用户账号
      parameters:
      - description: 注册请求
        in: body
        name: request
        required: true
        schema:
          properties:
            email:
              type: string
            password:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/backend_pkg_response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/backend_pkg_response.Response'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/backend_pkg_response.Response'
      summary: 用户注册
      tags:
      - users
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    description: 输入 "Bearer {token}" 进行JWT认证
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
