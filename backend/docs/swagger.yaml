        "200":
          description: 删除成功
          schema:
            $ref: '#/definitions/backend_pkg_response.Response'
        "400":
          description: 请求参数错误或无法删除有子节点的分类
          schema:
            $ref: '#/definitions/backend_pkg_response.Response'
        "404":
          description: 分类不存在
          schema:
            $ref: '#/definitions/backend_pkg_response.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/backend_pkg_response.Response'
